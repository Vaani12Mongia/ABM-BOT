<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIONOS News Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Top status bar ── */
    .topbar {
      background: #0f172a;
      color: #e2e8f0;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 28px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .3px;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .35; }
    }
    .stat {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
    }
    .stat span {
      color: #f1f5f9;
      font-weight: 600;
    }

    /* dry-run toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
    }
    .toggle-wrap label {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .track {
      position: absolute;
      inset: 0;
      background: #334155;
      border-radius: 20px;
      transition: background .2s;
    }
    .track::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked + .track { background: #2563eb; }
    .switch input:checked + .track::before { transform: translateX(16px); }
    #dry-run-label { font-size: 11px; color: #475569; }
    #dry-run-label.live { color: #f87171; font-weight: 600; }

    /* ── Action bar ── */
    .actionbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 24px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background .15s, opacity .15s, box-shadow .15s;
      line-height: 1;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-outline {
      background: transparent;
      color: #475569;
      border: 1px solid #cbd5e1;
    }
    .btn-outline:hover:not(:disabled) { background: #f8fafc; border-color: #94a3b8; }
    .btn-green { background: #16a34a; color: #fff; }
    .btn-green:hover:not(:disabled) { background: #15803d; }
    .btn-amber { background: #d97706; color: #fff; }
    .btn-amber:hover:not(:disabled) { background: #b45309; }
    .spacer { flex: 1; }

    /* ── Spinner overlay ── */
    .spinner-wrap {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .spinner-wrap.on { display: flex; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-label { color: #e2e8f0; font-size: 14px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #1e293b;
      color: #f1f5f9;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 320px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 300;
      line-height: 1.5;
    }
    .toast.on { opacity: 1; transform: translateY(0); }
    .toast.ok  { background: #15803d; }
    .toast.err { background: #dc2626; }

    /* ── Main layout ── */
    .main { max-width: 940px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: #e2e8f0;
      padding: 4px;
      border-radius: 9px;
      margin-bottom: 22px;
      gap: 2px;
    }
    .tab {
      flex: 1;
      padding: 9px 0;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      color: #64748b;
      border-radius: 7px;
      cursor: pointer;
      transition: all .15s;
    }
    .tab:hover:not(.active) { color: #1e293b; }
    .tab.active {
      background: #fff;
      color: #1e293b;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    .tab-count {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      background: #e2e8f0;
      color: #475569;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 5px;
      vertical-align: middle;
    }
    .tab.active .tab-count { background: #dbeafe; color: #1d4ed8; }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 52px 24px;
      color: #94a3b8;
    }
    .empty-icon { font-size: 38px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }

    /* ── News cards ── */
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 18px 20px 16px;
      margin-bottom: 14px;
      transition: box-shadow .15s;
    }
    .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.07); }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    /* priority badges */
    .badge {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .6px;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 4px;
    }
    .HIGH  { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .MEDIUM{ background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .LOW   { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }

    .cat-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 4px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }
    .source-label { font-size: 11px; color: #94a3b8; }
    .team-label   { margin-left: auto; font-size: 11px; color: #94a3b8; }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #0f172a;
      line-height: 1.45;
      margin-bottom: 12px;
    }
    .card-row {
      font-size: 13px;
      color: #475569;
      margin-bottom: 5px;
      line-height: 1.55;
    }
    .card-row b { color: #1e293b; font-weight: 600; }
    .card-link {
      display: inline-block;
      margin-top: 11px;
      font-size: 13px;
      font-weight: 600;
      color: #2563eb;
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }

    /* ── Newsletter preview ── */
    .preview-section { margin-top: 36px; }
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .preview-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
    }
    .preview-header h2 span { color: #64748b; font-weight: 400; }
    .preview-frame {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      min-height: 160px;
    }
    .preview-frame iframe {
      width: 100%;
      border: none;
      display: block;
      min-height: 360px;
    }
    .preview-empty-msg {
      padding: 52px 24px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }
    .preview-edit-area {
      padding: 20px;
      min-height: 300px;
      outline: none;
      font-size: 13px;
      line-height: 1.65;
      background: #fafafa;
      border: 2px dashed #93c5fd;
      border-radius: 10px;
    }

    /* ── Excluded card state ── */
    .card.excluded { opacity: 0.42; background: #f8fafc; }
    .card.excluded .card-title { text-decoration: line-through; color: #94a3b8; }

    /* ── Card tick / cross / undo buttons ── */
    .card-actions { margin-left: 8px; display: inline-flex; align-items: center; gap: 5px; }
    .btn-tick {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 5px;
      border: 1px solid #86efac; background: #dcfce7; color: #16a34a;
      font-size: 13px; flex-shrink: 0;
    }
    .btn-cross {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 5px;
      border: 1px solid #fca5a5; background: #fef2f2; color: #dc2626;
      font-size: 13px; cursor: pointer; flex-shrink: 0;
    }
    .btn-cross:hover { background: #fee2e2; }
    .btn-undo {
      padding: 2px 9px; border-radius: 5px;
      border: 1px solid #cbd5e1; background: #f1f5f9;
      color: #475569; font-size: 11px; cursor: pointer;
    }
    .btn-undo:hover { background: #e2e8f0; }
  </style>
</head>
<body>

<!-- ── Top status bar ── -->
<div class="topbar">
  <div class="brand">
    <div class="brand-dot"></div>
    AIONOS · News Bot
  </div>
  <div class="stat">Last run: <span id="s-time">—</span></div>
  <div class="stat">Fetched: <span id="s-fetched">—</span></div>
  <div class="stat">Passed AI: <span id="s-passed">—</span></div>
  <div class="toggle-wrap">
    <label>
      <span class="switch">
        <input type="checkbox" id="dry-toggle" checked>
        <span class="track"></span>
      </span>
      Dry run
    </label>
    <span id="dry-run-label">preview only</span>
  </div>
</div>

<!-- ── Action bar ── -->
<div class="actionbar">
  <button class="btn btn-primary" id="btn-fetch" onclick="fetchAll()">Fetch Latest News</button>
  <button class="btn btn-outline" id="btn-edit" onclick="toggleEdit()" disabled>Edit Newsletter</button>
  <div class="spacer"></div>
  <button class="btn btn-green" id="btn-send" onclick="sendAll()" disabled>Send Newsletter</button>
</div>

<!-- ── Spinner ── -->
<div class="spinner-wrap" id="spinner">
  <div class="spinner"></div>
  <div class="spinner-label" id="spinner-label">Fetching news…</div>
</div>

<!-- ── Main ── -->
<div class="main">

  <!-- Tabs -->
  <div class="tabs" id="tab-bar">
    <button class="tab active" data-acct="Indigo"  onclick="switchTab(this)">Indigo  <span class="tab-count" id="ct-Indigo">0</span></button>
    <button class="tab"        data-acct="Inetum"  onclick="switchTab(this)">Inetum  <span class="tab-count" id="ct-Inetum">0</span></button>
    <button class="tab"        data-acct="AIONOS"  onclick="switchTab(this)">AIONOS  <span class="tab-count" id="ct-AIONOS">0</span></button>
  </div>

  <!-- Panels (one per account, all pre-rendered so tab switch is instant) -->
  <div class="panel active" id="panel-Indigo"><div class="empty"><div class="empty-icon">📰</div><p>Click <b>Fetch Latest News</b> to load articles.</p></div></div>
  <div class="panel"        id="panel-Inetum"><div class="empty"><div class="empty-icon">📰</div><p>Click <b>Fetch Latest News</b> to load articles.</p></div></div>
  <div class="panel"        id="panel-AIONOS"><div class="empty"><div class="empty-icon">📰</div><p>Click <b>Fetch Latest News</b> to load articles.</p></div></div>

  <!-- Newsletter preview -->
  <div class="preview-section">
    <div class="preview-header">
      <h2>Newsletter Preview &nbsp;<span id="preview-label">— Indigo</span></h2>
    </div>
    <div class="preview-frame" id="preview-frame">
      <div class="preview-empty-msg">Fetch news to see the newsletter preview.</div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  let current        = "Indigo";
  let results        = {};   // { account: [article, …] }
  let previews       = {};   // { account: htmlString }
  let editMode       = false;
  let excluded       = {};   // { account: Set<title> }
  let sortedArticles = {};   // { account: [article, …] sorted by priority }

  const PRIORITY_ORDER = { HIGH: 0, MEDIUM: 1, LOW: 2 };

  // ── Dry-run toggle label ───────────────────────────────────────────────
  document.getElementById("dry-toggle").addEventListener("change", function () {
    const lbl = document.getElementById("dry-run-label");
    if (this.checked) {
      lbl.textContent = "preview only";
      lbl.classList.remove("live");
    } else {
      lbl.textContent = "LIVE — emails will send!";
      lbl.classList.add("live");
    }
  });

  // ── Utilities ─────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function showSpinner(msg) {
    document.getElementById("spinner-label").textContent = msg || "Working…";
    document.getElementById("spinner").classList.add("on");
  }
  function hideSpinner() {
    document.getElementById("spinner").classList.remove("on");
  }

  let _toastTimer;
  function toast(msg, type) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast on" + (type ? " " + type : "");
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove("on"), 3800);
  }

  function setCount(account, n) {
    const el = document.getElementById("ct-" + account);
    if (el) el.textContent = n;
  }

  // ── Tab switching ─────────────────────────────────────────────────────
  function switchTab(btn) {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    current = btn.dataset.acct;
    document.getElementById("panel-" + current).classList.add("active");
    document.getElementById("preview-label").textContent = "— " + current;

    // Show cached preview or fetch lazily
    if (previews[current] !== undefined) {
      renderPreview(previews[current]);
    } else if (results[current] !== undefined) {
      loadPreview(current);
    } else {
      document.getElementById("preview-frame").innerHTML =
        '<div class="preview-empty-msg">Fetch news to see the newsletter preview.</div>';
    }

    // Reset edit mode when switching tabs
    if (editMode) cancelEdit();
  }

  // ── Priority badge HTML ───────────────────────────────────────────────
  function priorityBadge(p) {
    const cls = { HIGH: "HIGH", MEDIUM: "MEDIUM", LOW: "LOW" }[p] || "LOW";
    return `<span class="badge ${cls}">${esc(p || "—")}</span>`;
  }

  // ── Build one news card ───────────────────────────────────────────────
  function buildCard(a, account, idx) {
    const isExcluded = excluded[account] && excluded[account].has(a.title);
    const opportunity = a.opportunity && a.opportunity !== "none identified"
      ? `<div class="card-row"><b>Opportunity:</b> ${esc(a.opportunity)}</div>` : "";
    const readLink = a.link
      ? `<a class="card-link" href="${esc(a.link)}" target="_blank" rel="noopener">Read source →</a>` : "";
    const actions = isExcluded
      ? `<button class="btn-undo" onclick="setExcluded('${account}',${idx},false)">↩ Undo</button>`
      : `<span class="btn-tick">✓</span><button class="btn-cross" onclick="setExcluded('${account}',${idx},true)">✗</button>`;

    return `
<div class="card${isExcluded ? ' excluded' : ''}">
  <div class="card-meta">
    ${priorityBadge(a.priority)}
    <span class="cat-badge">${esc(a.category)}</span>
    <span class="source-label">${esc(a.source)}</span>
    <span class="team-label">${esc(a.team)}</span>
    <span class="card-actions">${actions}</span>
  </div>
  <div class="card-title">${esc(a.title)}</div>
  <div class="card-row"><b>What happened:</b> ${esc(a.what_happened)}</div>
  <div class="card-row"><b>Why it matters:</b> ${esc(a.business_impact)}</div>
  <div class="card-row"><b>Recommended action:</b> ${esc(a.recommended_action)}</div>
  ${opportunity}
  ${readLink}
</div>`;
  }

  // ── Render all cards for an account panel ────────────────────────────
  function renderCards(account, articles) {
    const sorted = [...articles].sort(
      (a, b) => (PRIORITY_ORDER[a.priority] ?? 3) - (PRIORITY_ORDER[b.priority] ?? 3)
    );
    sortedArticles[account] = sorted;
    if (!excluded[account]) excluded[account] = new Set();
    renderCardPanel(account);
  }

  function renderCardPanel(account) {
    const panel = document.getElementById("panel-" + account);
    if (!panel) return;
    const articles = sortedArticles[account] || [];
    setCount(account, articles.length);
    if (!articles.length) {
      panel.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><p>No articles passed AI scoring for <b>${esc(account)}</b> this run.</p></div>`;
      return;
    }
    panel.innerHTML = articles.map((a, idx) => buildCard(a, account, idx)).join("");
  }

  // ── Render the newsletter preview iframe ─────────────────────────────
  function renderPreview(html) {
    const frame = document.getElementById("preview-frame");
    if (!html) {
      frame.innerHTML = '<div class="preview-empty-msg">No preview available for this account.</div>';
      return;
    }
    frame.innerHTML = "";
    const iframe = document.createElement("iframe");
    iframe.setAttribute("sandbox", "allow-same-origin");
    frame.appendChild(iframe);
    const doc = iframe.contentDocument;
    doc.open(); doc.write(html); doc.close();
    setTimeout(() => {
      try { iframe.style.minHeight = (doc.body.scrollHeight + 40) + "px"; } catch (_) {}
    }, 120);
  }

  // ── Fetch preview for one account from backend ───────────────────────
  async function loadPreview(account) {
    try {
      const r = await fetch("/api/preview/" + account);
      if (!r.ok) return;
      const html = await r.text();
      previews[account] = html;
      if (account === current) renderPreview(html);
    } catch (_) { /* preview is non-critical */ }
  }

  // ── FETCH ALL ─────────────────────────────────────────────────────────
  async function fetchAll() {
    showSpinner("Fetching and scoring news…");
    document.getElementById("btn-fetch").disabled = true;

    try {
      const res = await fetch("/api/fetch/all", { method: "POST" });
      if (!res.ok) throw new Error("Server returned " + res.status);
      const data = await res.json();

      results        = data;
      previews       = {};   // invalidate cached previews
      excluded       = {};   // reset article exclusions
      sortedArticles = {};   // reset sorted article cache

      let totalPassed = 0;
      for (const [acct, articles] of Object.entries(data)) {
        totalPassed += articles.length;
        renderCards(acct, articles);
      }

      // Update status bar
      document.getElementById("s-time").textContent    = new Date().toLocaleTimeString();
      document.getElementById("s-fetched").textContent = totalPassed;   // already filtered
      document.getElementById("s-passed").textContent  = totalPassed;

      // Load previews for all accounts in parallel
      await Promise.all(Object.keys(data).map(loadPreview));

      document.getElementById("btn-edit").disabled = false;
      document.getElementById("btn-send").disabled = false;
      toast("News fetched and scored.", "ok");

    } catch (e) {
      toast("Fetch failed: " + e.message, "err");
    } finally {
      hideSpinner();
      document.getElementById("btn-fetch").disabled = false;
    }
  }

  // ── SEND ALL ─────────────────────────────────────────────────────────
  async function sendAll() {
    const dry = document.getElementById("dry-toggle").checked;
    if (!dry && !confirm("Dry-run is OFF — this will send real emails to all owners. Continue?")) return;

    // Auto-save any in-progress edit for the active account before sending
    const editArea = document.getElementById("edit-area");
    if (editArea) {
      const html = editArea.innerHTML;
      previews[current] = html;
      try {
        await fetch("/api/newsletter/" + current, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ html }),
        });
      } catch (_) {}
    }

    showSpinner(dry ? "Running dry-run…" : "Sending emails…");
    document.getElementById("btn-send").disabled = true;

    try {
      const res = await fetch("/api/send/all?dry_run=" + dry, { method: "POST" });
      if (!res.ok) throw new Error("Server returned " + res.status);
      const data = await res.json();
      const sent = data.results.filter(r => !r.skipped).length;
      toast(
        dry
          ? `Dry run done — ${sent} digest(s) printed to server console.`
          : `Sent ${sent} newsletter(s).`,
        "ok"
      );
    } catch (e) {
      toast("Send failed: " + e.message, "err");
    } finally {
      hideSpinner();
      document.getElementById("btn-send").disabled = false;
    }
  }

  // ── EDIT NEWSLETTER ───────────────────────────────────────────────────
  async function toggleEdit() {
    if (editMode) { await saveEdit(); } else { startEdit(); }
  }

  function startEdit() {
    const html = previews[current] || "";
    if (!html) { toast("No preview to edit — fetch first.", "err"); return; }
    editMode = true;
    document.getElementById("preview-frame").innerHTML =
      `<div class="preview-edit-area" contenteditable="true" id="edit-area">${html}</div>`;
    const btn = document.getElementById("btn-edit");
    btn.textContent = "Save Edits";
    btn.classList.replace("btn-outline", "btn-amber");
  }

  async function saveEdit() {
    const area = document.getElementById("edit-area");
    if (!area) { cancelEdit(); return; }
    const html = area.innerHTML;
    previews[current] = html;
    try {
      const res = await fetch("/api/newsletter/" + current, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ html }),
      });
      if (!res.ok) throw new Error("Server returned " + res.status);
      toast("Newsletter saved.", "ok");
    } catch (e) {
      toast("Save failed: " + e.message, "err");
    }
    cancelEdit();
  }

  function cancelEdit() {
    editMode = false;
    renderPreview(previews[current] || "");
    const btn = document.getElementById("btn-edit");
    btn.textContent = "Edit Newsletter";
    btn.classList.replace("btn-amber", "btn-outline");
  }

  // ── ARTICLE SELECTION ─────────────────────────────────────────────────
  async function setExcluded(account, idx, exclude) {
    const title = (sortedArticles[account] || [])[idx]?.title;
    if (!title) return;
    if (!excluded[account]) excluded[account] = new Set();
    if (exclude) {
      excluded[account].add(title);
    } else {
      excluded[account].delete(title);
    }
    renderCardPanel(account);
    await updateSelectionPreview(account);
  }

  async function updateSelectionPreview(account) {
    const articles = sortedArticles[account] || [];
    const exc = excluded[account] || new Set();
    const selectedTitles = articles.filter(a => !exc.has(a.title)).map(a => a.title);
    try {
      const res = await fetch("/api/select/" + account, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ selected_titles: selectedTitles }),
      });
      if (!res.ok) return;
      const data = await res.json();
      previews[account] = data.html;
      if (account === current) renderPreview(data.html);
    } catch (_) {}
  }
</script>
